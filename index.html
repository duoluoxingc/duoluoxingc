<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>。player125 · 资源分享</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #07070d;
      --card: #0f0f18;
      --border: #1e1e2e;
      --accent: #8b7fff;
      --accent2: #ff6eb0;
      --text: #eeeef5;
      --muted: #5a5a78;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif SC', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Stars background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 60%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 75%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 35% 45%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(600px 600px at 30% 40%, rgba(139,127,255,0.06) 0%, transparent 70%),
        radial-gradient(500px 500px at 75% 65%, rgba(255,110,176,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 44px;
      animation: fadeUp 0.6s ease both;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 18px;
      animation: glow 3s ease-in-out infinite;
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      z-index: -1;
      opacity: 0.3;
      filter: blur(8px);
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 24px rgba(139,127,255,0.4); }
      50% { box-shadow: 0 0 48px rgba(139,127,255,0.6), 0 0 72px rgba(255,110,176,0.25); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 70%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .handle {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* Section label */
    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeUp 0.6s ease 0.1s both;
    }
    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* Kontra badge */
    .kontra-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(139,127,255,0.12), rgba(255,110,176,0.08));
      border: 1px solid rgba(139,127,255,0.25);
      border-radius: 100px;
      padding: 5px 16px 5px 10px;
      margin-bottom: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #a99fff;
      letter-spacing: 0.06em;
    }

    .kontra-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: all 0.3s ease;
      animation: fadeUp 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    .card:nth-child(1) { animation-delay: 0.2s; }
    .card:nth-child(2) { animation-delay: 0.3s; }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,127,255,0.5), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover::before { opacity: 1; }

    .card:hover {
      border-color: rgba(139,127,255,0.3);
      transform: translateY(-3px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 30px rgba(139,127,255,0.06);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-left { flex: 1; min-width: 0; }

    .card-num {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--accent);
      letter-spacing: 0.15em;
      margin-bottom: 7px;
      opacity: 0.6;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge-primary {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      background: rgba(139,127,255,0.15);
      border: 1px solid rgba(139,127,255,0.3);
      color: var(--accent);
      border-radius: 4px;
      padding: 2px 7px;
      letter-spacing: 0.05em;
    }

    .badge-backup {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      background: rgba(255,110,176,0.1);
      border: 1px solid rgba(255,110,176,0.25);
      color: var(--accent2);
      border-radius: 4px;
      padding: 2px 7px;
      letter-spacing: 0.05em;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 22px;
      border-radius: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      flex-shrink: 0;
      transition: all 0.25s ease;
      letter-spacing: 0.04em;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(139,127,255,0.22), rgba(139,127,255,0.08));
      border: 1px solid rgba(139,127,255,0.35);
      color: #c4baff;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(139,127,255,0.4), rgba(139,127,255,0.15));
      color: #fff;
      box-shadow: 0 4px 24px rgba(139,127,255,0.35);
      transform: scale(1.05);
    }

    .btn-backup {
      background: linear-gradient(135deg, rgba(255,110,176,0.18), rgba(255,110,176,0.06));
      border: 1px solid rgba(255,110,176,0.3);
      color: #ffaacc;
    }

    .btn-backup:hover {
      background: linear-gradient(135deg, rgba(255,110,176,0.35), rgba(255,110,176,0.12));
      color: #fff;
      box-shadow: 0 4px 24px rgba(255,110,176,0.3);
      transform: scale(1.05);
    }

    .btn svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 36px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      animation: fadeUp 0.5s ease 0.4s both;
    }

    @media (max-width: 480px) {
      .card { flex-direction: column; align-items: flex-start; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>

</body>
</html>
