<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kontra脚本分享</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #07070d;
      --card: #0f0f18;
      --border: #1e1e2e;
      --accent: #8b7fff;
      --accent2: #ff6eb0;
      --text: #eeeef5;
      --muted: #5a5a78;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif SC', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%), radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%), radial-gradient(1.5px 1.5px at 50% 60%, rgba(255,255,255,0.25) 0%, transparent 100%), radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%), radial-gradient(1px 1px at 70% 75%, rgba(255,255,255,0.2) 0%, transparent 100%), radial-gradient(1.5px 1.5px at 35% 45%, rgba(255,255,255,0.15) 0%, transparent 100%), radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.2) 0%, transparent 100%), radial-gradient(600px 600px at 30% 40%, rgba(139,127,255,0.06) 0%, transparent 70%), radial-gradient(500px 500px at 75% 65%, rgba(255,110,176,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .kontra-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(139,127,255,0.12), rgba(255,110,176,0.08));
      border: 1px solid rgba(139,127,255,0.25);
      border-radius: 100px;
      padding: 5px 16px 5px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #a99fff;
    }
    .kontra-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      border-color: rgba(139,127,255,0.3);
      transform: translateY(-3px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 30px rgba(139,127,255,0.06);
    }
    .card-left { flex: 1; }
    .card-num {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--accent);
      letter-spacing: 0.15em;
      margin-bottom: 7px;
      opacity: 0.6;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge-primary, .badge-backup, .badge-contact {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      border-radius: 4px;
      padding: 2px 7px;
    }
    .badge-primary {
      background: rgba(139,127,255,0.15);
      border: 1px solid rgba(139,127,255,0.3);
      color: var(--accent);
    }
    .badge-backup {
      background: rgba(255,110,176,0.1);
      border: 1px solid rgba(255,110,176,0.25);
      color: var(--accent2);
    }
    .badge-contact {
      background: rgba(139,127,255,0.12);
      border: 1px solid rgba(139,127,255,0.2);
      color: #b7adff;
    }
    .card-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .contact-line {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 8px 0 4px;
    }
    .contact-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(90, 90, 120, 0.12);
      padding: 4px 12px 4px 10px;
      border-radius: 40px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #bfbfdd;
      text-decoration: none;
      transition: all 0.2s;
    }
    .contact-item:hover {
      background: rgba(139, 127, 255, 0.2);
      color: #fff;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 22px;
      border-radius: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, rgba(139,127,255,0.22), rgba(139,127,255,0.08));
      border: 1px solid rgba(139,127,255,0.35);
      color: #c4baff;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(139,127,255,0.4), rgba(139,127,255,0.15));
      color: #fff;
      transform: scale(1.05);
    }
    .btn-backup {
      background: linear-gradient(135deg, rgba(255,110,176,0.18), rgba(255,110,176,0.06));
      border: 1px solid rgba(255,110,176,0.3);
      color: #ffaacc;
    }
    .btn-backup:hover {
      background: linear-gradient(135deg, rgba(255,110,176,0.35), rgba(255,110,176,0.12));
      color: #fff;
      transform: scale(1.05);
    }
    .btn svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }
    footer {
      text-align: center;
      margin-top: 36px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    @media (max-width: 480px) {
      .card { flex-direction: column; align-items: flex-start; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="section-label">
    <div class="kontra-badge"><span class="dot"></span> Kontra 脚本分享</div>
  </div>

  <div class="cards">
    <!-- 资源1：蓝奏云 -->
    <div class="card">
      <div class="card-left">
        <div class="card-num">RESOURCE · 01</div>
        <div class="card-title">蓝奏云 密码:kontra <span class="badge-primary">推荐</span></div>
        <div class="card-desc">访问速度快，无需登录，推荐优先使用。</div>
      </div>
      <a class="btn btn-primary" href="https://duoluoxingc.lanzout.com/b014x94f5i" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z"/></svg> 获取
      </a>
    </div>

    <!-- 资源2：雨天网盘 -->
    <div class="card">
      <div class="card-left">
        <div class="card-num">RESOURCE · 02</div>
        <div class="card-title">雨天网盘 <span class="badge-backup">备用</span></div>
        <div class="card-desc">无需登录，访问速度较慢，可作为备用入口。</div>
      </div>
      <a class="btn btn-backup" href="https://rainydrive.cnrainycloudglobal.pp.ua/s/RVf1" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z"/></svg> 获取
      </a>
    </div>

    <!-- 联系方式卡片 - QQ链接改用官方加好友接口 -->
    <div class="card">
      <div class="card-left">
        <div class="card-num">CONTACT</div>
        <div class="card-title">联系方式 <span class="badge-contact">联络</span></div>
        <div class="contact-line">
          <a class="contact-item" href="https://wpa.qq.com/msgrd?v=3&uin=2665984763&site=qq&menu=yes" target="_blank" rel="noopener">💬 QQ: 2665984763</a>
          <a class="contact-item" href="https://github.com/duoluoxingc/kontra" target="_blank" rel="noopener">🐙 GitHub</a>
        </div>
        <div class="card-desc">脚本反馈</div>
      </div>
    </div>
  </div>
  <footer>脚本仅供学习交流使用</footer>
</div>

<script>
  // QQ号点击复制功能（作为备用，同时保留跳转加好友）
  (function() {
    const qqItem = document.querySelector('.contact-item[href*="wpa.qq.com"]');
    if (!qqItem) return;
    qqItem.addEventListener('click', function(e) {
      const qq = '2665984763';
      navigator.clipboard.writeText(qq).then(() => showTip('✓ QQ号已复制: ' + qq)).catch(() => {
        let t = document.createElement('textarea');
        t.value = qq;
        document.body.appendChild(t);
        t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        showTip('✓ QQ号已复制');
      });
    });
    let tip = null;
    function showTip(msg) {
      if (!tip) {
        tip = document.createElement('div');
        tip.id = 'copyTip';
        tip.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1e2ee6;backdrop-filter:blur(20px);color:#dfdfff;font-family:"Space Mono",monospace;font-size:12px;padding:6px 18px;border-radius:80px;z-index:2100;border:1px solid rgba(139,127,255,0.4);pointer-events:none;opacity:0;transition:opacity 0.2s';
        document.body.appendChild(tip);
      }
      tip.textContent = msg;
      tip.style.opacity = '1';
      setTimeout(() => tip.style.opacity = '0', 1800);
    }
  })();
</script>
</body>
</html>
